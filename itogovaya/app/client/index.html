<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сервисные задания</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════ ЭКРАН ВХОДА ═══════════════ -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <h1>Система сервисных заданий</h1>
    <form id="login-form">
      <label>Логин
        <input type="text" id="username" placeholder="Введите логин" required autocomplete="username">
      </label>
      <label>Пароль
        <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password">
      </label>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" id="login-btn">Войти</button>
    </form>
  </div>
</div>

<!-- ═══════════════ ДАШБОРД ═══════════════ -->
<div id="dashboard-screen" class="screen hidden">
  <header class="topbar">
    <span class="app-logo">СТЗ</span>
    <span id="user-info"></span>
    <button id="logout-btn" class="btn-ghost">Выйти</button>
  </header>

  <div class="layout">
    <!-- Боковая навигация (показывается по роли) -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- Основной контент -->
    <main class="content" id="main-content">
      <p class="hint">Выберите раздел в меню слева.</p>
    </main>
  </div>
</div>

<!-- ═══════════════ МОДАЛЬНОЕ ОКНО ═══════════════ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <button id="modal-close" class="modal-close">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
